        <script>
            function saveName() {
                var name = $("input[name='name']").val();
                localStorage.setItem("userName", name);
                let string = JSON.stringify(localStorage.getItem("userName"));
                let greeting = "Hello, " + name + "! Welcome to my homepage!";
                let d = document.createElement("h1");
                d.innerHTML = greeting;
                document.body.prepend(d);
            }
        </script>
